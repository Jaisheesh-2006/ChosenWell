# Render Blueprint
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: chosenwell-api
    runtime: go
    region: oregon
    rootDir: apps/backend
    buildCommand: go build -tags netgo -ldflags '-s -w' -o app ./cmd/api
    startCommand: ./app
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false # Set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false # Set manually in Render dashboard
