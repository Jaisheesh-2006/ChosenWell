openapi: 3.1.0
info:
  title: Curated Health Products API
  version: 0.1.0
  description: >
    Minimal API for the curated health-products storefront (content + curation).
    Commerce (orders) and auth are intentionally omitted in v0.1.
servers:
  - url: http://localhost:8081
paths:
  /health:
    get:
      summary: Service health check
      responses:
        "200":
          description: Service status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string
                required:
                  - status
                  - service

  /categories:
    get:
      summary: List content categories
      description: Returns categories used to drive SEO pages (e.g., toothpaste, cooking-oil)
      responses:
        "200":
          description: Array of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySummary"

  /categories/{slug}:
    get:
      summary: Category detail and curated picks
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Category page data (SEO long-form + curated list)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          $ref: "#/components/responses/NotFound"

  /products:
    get:
      summary: List curated products (filterable by structured tags)
      description: |
        Returns curated products with powerful filtering. Tags are structured into categories:
        - **concern**: Primary hair/scalp concern (dandruff_safe, hair_fall_support, dry_frizzy, oily_scalp, sensitive_scalp)
        - **philosophy**: Ingredient philosophy (ayurvedic, certified_organic, modern_clean, zero_chemical, solid_bar)
        - **budget**: Price tier (premium, mid_range, affordable)
        - **usage**: Usage pattern (daily_use, alternate_day, weekly_detox)
      parameters:
        - name: category
          in: query
          schema:
            type: string
          description: Category slug to filter by (e.g., "shampoo", "toothpaste")
        - name: concern
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          description: Primary concern tags - can specify multiple (any match)
        - name: philosophy
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          description: Ingredient philosophy tags - can specify multiple (any match)
        - name: budget
          in: query
          schema:
            type: string
            enum: [premium, mid_range, affordable]
          description: Budget tier (exactly one per product)
        - name: usage
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          description: Recommended usage pattern - can specify multiple (any match)
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [score, name]
            default: score
          description: Sort field
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort order
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number for pagination
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Maximum products per page
      responses:
        "200":
          description: Returns curated catalog (summaries) with available filters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"

  /products/filters:
    get:
      summary: Get available filter options
      description: Returns available tags and their counts for building filter UI. Optionally filter by category.
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: Optional category slug to get filters for (returns all filters if omitted)
      responses:
        "200":
          description: Available filters with counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilterOptions"

  /products/{slug}:
    get:
      summary: Retrieve a single product by slug (SEO-friendly)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: country
          in: query
          schema:
            type: string
            default: US
          description: ISO country code for localized pricing (e.g., US, IN, GB)
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          $ref: "#/components/responses/NotFound"

  /products/{slug}/similar:
    get:
      summary: Get similar products based on category, tags, and attributes
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 6
          description: Maximum number of similar products to return
      responses:
        "200":
          description: Array of similar products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductSummary"
        "404":
          $ref: "#/components/responses/NotFound"

  /currencies:
    get:
      summary: Get supported currencies and exchange rates
      responses:
        "200":
          description: List of supported currencies with exchange rates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrencyList"

  /methodology:
    get:
      summary: Public methodology - how products are evaluated
      responses:
        "200":
          description: Methodology text and scoring rules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Methodology"

components:
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    CategorySummary:
      type: object
      properties:
        slug:
          type: string
          description: SEO-friendly identifier (e.g., "toothpaste")
        title:
          type: string
        description:
          type: string
      required:
        - slug
        - title

    Category:
     type: object
     properties:
      slug:
        type: string
      title:
        type: string
      long_description:
        type: string
        description: SEO-rich long-form content (HTML or markdown)
      criteria:
        $ref: "#/components/schemas/CategoryCriteria"
      criteria_version:
        type: string
        description: Version of criteria used for this category
      curated_products:
        type: array
        items:
          $ref: "#/components/schemas/ProductSummary"
     required:
     - slug
     - title
     - long_description
     - criteria
    CategoryCriteria:
      type: object
      properties:
       must_have:
        type: array
        items:
          type: string
       good_to_have:
        type: array
        items:
          type: string
       disqualifiers:
        type: array
        items:
          type: string
      required:
       - must_have
       - disqualifiers


    ProductSummary:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
          description: SEO slug used in URLs (required)
        name:
          type: string
        brand:
          type: string
        score:
          type: number
          format: float
          description: 0-100 aggregated score
        short_reason:
          type: string
        price_range:
          type: string
        budget_tier:
          type: string
          enum: [premium, mid_range, affordable]
          description: Budget classification (exactly one per product)
        tags:
          $ref: "#/components/schemas/ProductTags"
      required:
        - slug
        - name
        - score

    ProductTags:
      type: object
      description: Structured tags for filtering - each tag must be explainable on product page
      properties:
        concern:
          type: array
          items:
            type: string
            enum: [dandruff, hair_fall, dry_frizzy, oily_scalp, sensitive_scalp]
          maxItems: 2
          description: Primary concern tags (max 1-2) - only if product is explicitly strong here
        philosophy:
          type: array
          items:
            type: string
            enum: [ayurvedic, certified_organic, modern_clean, zero_chemical, solid_bar]
          maxItems: 2
          description: Ingredient philosophy (1-2 tags)
        budget:
          type: string
          enum: [premium, mid_range, affordable]
          description: Budget tier (exactly one, no ambiguity)
        usage:
          type: array
          items:
            type: string
            enum: [daily_use, alternate_day, weekly_detox]
          maxItems: 1
          description: Recommended usage pattern

    ProductListResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/ProductSummary"
        totalCount:
          type: integer
          description: Total products matching filters
        page:
          type: integer
          description: Current page number
        limit:
          type: integer
          description: Products per page
        totalPages:
          type: integer
          description: Total number of pages
      required:
        - products
        - totalCount
        - page
        - limit
        - totalPages

    FilterOptions:
      type: object
      description: Available filter options for a category with counts
      properties:
        concerns:
          type: array
          items:
            $ref: "#/components/schemas/FilterOption"
        philosophies:
          type: array
          items:
            $ref: "#/components/schemas/FilterOption"
        budgets:
          type: array
          items:
            $ref: "#/components/schemas/FilterOption"
        usages:
          type: array
          items:
            $ref: "#/components/schemas/FilterOption"
      required:
        - concerns
        - philosophies
        - budgets
        - usages

    FilterOption:
      type: object
      properties:
        value:
          type: string
        label:
          type: string
          description: Human-readable label
        count:
          type: integer
          description: Number of products with this tag
      required:
        - value
        - label
        - count

    Product:
     type: object
     properties:
       id:
         type: string
       slug:
         type: string
       name:
         type: string
       brand:
         type: string
       category:
         type: string
       score:
         type: number
         format: float
       score_breakdown:
         type: array
         items:
           $ref: "#/components/schemas/ScoreBreakdown"
         description: Optional detailed scoring for transparency
       why_recommended:
         type: array
         items:
           type: string
       pros:
         type: array
         items:
           type: string
       cons:
         type: array
         items:
           type: string
       ingredients_summary:
         type: string
       certifications:
         type: array
         items:
           type: string
       buy_links:
         type: array
         items:
           type: object
           properties:
             vendor:
               type: string
             url:
               type: string
       price_range:
         type: string
       prices:
         type: array
         items:
           $ref: "#/components/schemas/LocalizedPrice"
       tags:
         $ref: "#/components/schemas/ProductTags"
       tag_explanations:
         type: array
         items:
           $ref: "#/components/schemas/TagExplanation"
         description: Why each tag was assigned - critical for trust
       last_reviewed:
         type: string
         format: date
     required:
       - slug
       - name
       - score

    TagExplanation:
      type: object
      description: Explains why a specific tag was assigned to this product
      properties:
        tag:
          type: string
        tag_type:
          type: string
          enum: [concern, philosophy, budget, usage]
        explanation:
          type: string
          description: Brief reason why this product earned this tag
      required:
        - tag
        - tag_type
        - explanation


    LocalizedPrice:
      type: object
      properties:
        country:
          type: string
          description: ISO country code (e.g., US, IN, GB)
        currency:
          type: string
          description: Currency code (e.g., USD, INR, GBP)
        currency_symbol:
          type: string
          description: Currency symbol (e.g., $, ₹, £)
        min_price:
          type: number
          format: float
        max_price:
          type: number
          format: float
        formatted:
          type: string
          description: Pre-formatted price string (e.g., "$29-35")
      required:
        - country
        - currency
        - min_price

    CurrencyList:
      type: object
      properties:
        base_currency:
          type: string
          default: USD
        currencies:
          type: array
          items:
            $ref: "#/components/schemas/Currency"
      required:
        - currencies

    Currency:
      type: object
      properties:
        code:
          type: string
          description: Currency code (e.g., USD, INR, GBP)
        symbol:
          type: string
          description: Currency symbol (e.g., $, ₹, £)
        name:
          type: string
          description: Full currency name (e.g., US Dollar)
        country:
          type: string
          description: Primary country code (e.g., US, IN, GB)
        exchange_rate:
          type: number
          format: float
          description: Exchange rate relative to base currency (USD)
      required:
        - code
        - symbol
        - country
        - exchange_rate

    Methodology:
      type: object
      properties:
        version:
          type: string
        summary:
          type: string
        scoring:
          type: object
          additionalProperties:
            type: number
            description: weight for each factor (e.g., "no_sulfates": 0.2)
        last_updated:
          type: string
          format: date
      required:
        - version
        - summary
    ScoreBreakdown:
      type: object
      properties:
        factor:
          type: string
          description: Name of the scoring factor (e.g., ingredient_safety)
        score:
          type: number
          format: float
        max_score:
          type: number
          format: float
      required:
        - factor
        - score
        - max_score
    
    Error:
      type: object
      properties:
        message:
          type: string

